<!DOCTYPE html>

<html>

<head>

  <title>Vision HUD</title>



  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>



  <style>

    body {

      margin: 0;

      overflow: hidden;

      background: #020202;

      font-family: monospace;

    }



    #camera {

      position: absolute;

      top: 80px;

      left: 20px;

      border: 1px solid #00ffcc;

      opacity: 0.4;

      box-shadow: 0 0 15px #00ffcc;

      display: none;

    }



    #scanLine {

      position: absolute;

      width: 300px;

      height: 2px;

      background: #00ffcc;

      top: 80px;

      left: 20px;

      animation: scan 2s infinite;

      box-shadow: 0 0 10px #00ffcc;

      display: none;

    }

    .blurText {
      filter: blur(6px);
      opacity: 0.6;
    }



    @keyframes scan {

      0% { transform: translateY(0); }

      100% { transform: translateY(200px); }

    }

  </style>

</head>



<body>



<a-scene background="color: #020202">
  <a-assets>
  <video id="officeVideo"
         src="https://cdn.coverr.co/videos/coverr-working-in-modern-office-5176/1080p.mp4"
         autoplay
         loop
         muted
         crossorigin="anonymous"
         playsinline
         webkit-playsinline>
  </video>
</a-assets>

<a-videosphere id="videoSphere"
               src="#officeVideo"
               rotation="0 -90 0"
               opacity="0">
</a-videosphere>



  <!-- CAMERA -->

  <a-entity camera look-controls position="0 1.6 0"></a-entity>



  <!-- GRID -->

  <a-plane rotation="-90 0 0" width="20" height="20"

           material="wireframe: true; color: #0aff9d; opacity: 0.1">

  </a-plane>



  <!-- HUD CENTRAL (BAIXO PRA NÃO PEGAR TEXTO) -->

  <a-entity position="0 1.25 -2">



    <a-ring id="ring"

            radius-inner="0.25"

            radius-outer="0.27"

            color="#00ffcc"

            animation="property: rotation; to: 0 0 360; loop: true; dur: 8000">

    </a-ring>



    <a-circle radius="0.02" color="#00ffcc"></a-circle>



  </a-entity>



  <!-- LINHA SUPERIOR -->

  <a-plane position="0 2.55 -2" width="2" height="0.005"

           color="#00ffcc" opacity="0.4">

  </a-plane>



  <!-- TÍTULO -->

  <a-text value="VISION SYSTEM"

          position="0 2.3 -2"

          align="center"

          color="#00ffcc"

          scale="1.2 1.2 1.2">

  </a-text>



  <!-- STATUS -->

  <a-text id="statusHUD"

          value="INICIALIZANDO..."

          position="0 2.0 -2"

          align="center"

          color="#00ff88"

          scale="0.9 0.9 0.9">

  </a-text>



  <!-- SUBSTATUS -->

  <a-text id="subStatusHUD"

          value=""

          position="0 1.75 -2"

          align="center"

          color="#00ffaa"

          scale="0.8 0.8 0.8">

  </a-text>



  <!-- CÓDIGO -->

  <a-text 
        id="codeHUD"
        value=""
        position="0 1.0 -1"
        align="center"
        color="#00ffcc"
        scale="0.8 0.8 0.8">

  </a-text> 

<a-text 
  id="modeHUD"
  value="MODE: ON"
  position="1.2 2.4 -2"
  align="right"
  color="#00ffcc"
  scale="0.5 0.5 0.5"
  click-toggle>
</a-text>

  <!-- LINHA INFERIOR -->

  <a-plane position="0 0.7 -2" width="2" height="0.005"

           color="#00ffcc" opacity="0.2">

  </a-plane>



</a-scene>



<!-- CAMERA -->

<video id="camera" width="300" height="200" autoplay></video>

<div id="scanLine"></div>



<script>

// ================= CONFIG =================
let modo = "ON";
let iaAtiva = false;

// ================= CLICK MODE =================
document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();

    modo = (modo === "ON") ? "LOCK" : "ON";

    $("#modeHUD").attr("value", "MODE: " + modo);

    $("#subStatusHUD").attr("value",
      modo === "ON" ? "MODO NORMAL" : "MODO SEGURO (LOCK)");

    glowSuccess();
  }
});

// ================= FUNÇÕES =================
function gerarCodigo() {
  return Math.floor(100000 + Math.random() * 900000);
}

function glowSuccess() {
  $("#ring").attr("animation",
    "property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: 4; dur: 300");
}

// ================= SISTEMA =================
function iniciarSistema() {

  // ETAPA 1
  $("#statusHUD").attr("value", "ESCANEANDO QR CODE...");
  if (!iaAtiva) {
    $("#subStatusHUD").attr("value", "POSICIONE O CODIGO");
  }

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      $("#camera")[0].srcObject = stream;
      $("#camera").show();
      $("#scanLine").show();
    })
    .catch(() => {
      $("#statusHUD").attr("value", "ERRO CAMERA");
      $("#subStatusHUD").attr("value", "PERMISSÃO NEGADA");
    });

  // QR OK
  setTimeout(() => {
    $("#statusHUD").attr("value", "QR CODE VALIDADO");
    if (!iaAtiva) {
      $("#subStatusHUD").attr("value", "IDENTIDADE CAPTURADA");
    }
    glowSuccess();
  }, 5000);

  // ETAPA 2
  setTimeout(() => {
    if (!iaAtiva) {
      $("#statusHUD").attr("value", "📡 ENVIANDO TOKEN...");
      $("#subStatusHUD").attr("value", "DISPOSITIVO MOVEL");
    }
  }, 9000);

  // ETAPA 3
  setTimeout(() => {
    if (!iaAtiva) {
      $("#statusHUD").attr("value", "📱 FACE ID REQUERIDO");
      $("#subStatusHUD").attr("value", "CONFIRME NO CELULAR");
    }
  }, 13000);

  setTimeout(() => {
    if (!iaAtiva) {
      $("#statusHUD").attr("value", "✅ FACE ID VALIDADO");
      $("#subStatusHUD").attr("value", "AUTENTICAÇÃO FORTE");
      glowSuccess();
    }
  }, 17000);

  // ETAPA 4 (CORRIGIDO)
  setTimeout(() => {
    if (!iaAtiva) {
      let codigo = gerarCodigo();
      $("#statusHUD").attr("value", "🔐 TOKEN CONFIRMADO");
      $("#subStatusHUD").attr("value", "SINCRONIZAÇÃO SEGURA");
      $("#codeHUD").attr("value", "TOKEN: " + codigo);
    }
  }, 21000);

  // ETAPA 5
  setTimeout(() => {
    if (!iaAtiva) {
      $("#statusHUD").attr("value", "📍 VERIFICANDO LOCALIZAÇÃO...");
      $("#subStatusHUD").attr("value", "ANALISANDO AMBIENTE");
      $("#codeHUD").attr("value", "");
    }
  }, 26000);

  setTimeout(() => {
    if (!iaAtiva) {
      $("#statusHUD").attr("value", "🟢 ZONA SEGURA CONFIRMADA");
      $("#subStatusHUD").attr("value", "ACESSO AUTORIZADO");
      glowSuccess();
    }
  }, 31000);

  // FINAL LIMPO (SEM DUPLICAÇÃO)
  setTimeout(() => {

    $("#statusHUD").attr("value", "ACESSO LIBERADO");
    $("#subStatusHUD").attr("value", "IA ONLINE - AGUARDANDO COMANDO");
    if (!iaAtiva) {
      iaAtiva = true;
      iniciarIA();
    }
    glowSuccess();

    let video = document.querySelector("#officeVideo");
    video.play();

    let sphere = document.querySelector("#videoSphere");
    sphere.setAttribute("animation", {
      property: "opacity",
      to: 1,
      dur: 4000,
      easing: "easeInOutQuad"
    });

  }, 36000);
}

// ================= IA =================
let recognition = null;
let iaRodando = false;

let baseDados = {
  "sistema|zistema|ssistema": "bateria do sistema funcionando 100%",
  "refinaria": "Refinarias operando em 78%",
  "exploracao": "no momento está aguardando acesso",
  "producao": "5646 barril"
};

// ================= NORMALIZA TEXTO =================
function limparTexto(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// ================= RESPOSTA =================
function responder(texto) {

  let textoLimpo = limparTexto(texto);

  console.log("🎤 Você disse:", textoLimpo);

  let encontrou = false;

  for (let chave in baseDados) {

    if (textoLimpo.includes(chave)) {

      encontrou = true;

      if (modo === "ON") {
        mostrarMensagem(baseDados[chave]);
      } else {
        mostrarMensagem("████████████████████");
      }

      glowSuccess();
      break;
    }
  }

  if (!encontrou) {
    console.log("❌ Não reconhecido");
  }
}

// ================= UI =================
function mostrarMensagem(msg) {
  $("#subStatusHUD")
    .attr("value", msg)
    .attr("opacity", "1");

  setTimeout(() => {
    $("#subStatusHUD").attr("value", "");
  }, 3000);
}

// ================= START IA =================
function iniciarIA() {

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    $("#subStatusHUD").attr("value", "IA NÃO SUPORTADA");
    return;
  }

  recognition = new SpeechRecognition();

  recognition.lang = "pt-BR";
  recognition.continuous = true;
  recognition.interimResults = true; // 🔥 melhora MUITO detecção

  recognition.onstart = function () {
    iaRodando = true;
    console.log("✅ IA ouvindo...");
  };

  recognition.onend = function () {
    iaRodando = false;

    if (!iaAtiva) return;

    console.log("🔁 Reiniciando IA...");

    setTimeout(() => {
      try {
        recognition.start();
      } catch (e) {
        console.log("Erro restart:", e);
      }
    }, 800);
  };

  recognition.onerror = function (event) {
    console.log("⚠️ Erro:", event.error);

    if (event.error === "not-allowed") {
      $("#subStatusHUD").attr("value", "MIC BLOQUEADO");
      iaAtiva = false;
    }
  };

  recognition.onresult = function (event) {

    let resultado = event.results[event.results.length - 1];

    if (!resultado.isFinal) return; // 🔥 ignora parcial

    let texto = resultado[0].transcript;

    responder(texto);
  };

  try {
    recognition.start();
  } catch (e) {
    console.log("Erro iniciar:", e);
  }
}
// ================= START =================
$(document).ready(function(){
  setTimeout(iniciarSistema, 2000);
});

let iaIniciada = false;

$(document).one("click", function(){
  if (!iaIniciada) {
    iaAtiva = true;
    iniciarIA();
    iaIniciada = true;

    $("#subStatusHUD").attr("value", "IA OUVINDO...");
  }
});

</script>



</body>

</html>
